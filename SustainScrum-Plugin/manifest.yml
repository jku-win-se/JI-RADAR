modules:
  jira:adminPage:
    - key: sustainscrum-admin-page
      resource: admin-page-resource
      resolver:
        function: resolver
      title: SustainScrum Plugin
  jira:projectPage:
    - key: sustainscrum-project
      resource: project-page-resource
      resolver:
        function: resolver
      title: SustainScrum
      pages:
        - title: SuMM Configuration
          route: summ
        - title: Sustainability Dashboard
          route: dashboard
  jira:issuePanel:
    - key: sustainability-panel
      resource: issue-panel-resource
      resolver:
        function: resolver
      viewportSize: large
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
      title: Sustainability Panel
  # Collapsible panel in the issue right sidebar (more discoverable than issuePanel alone).
  jira:issueContext:
    - key: sustainability-issue-context
      resource: issue-panel-resource
      resolver:
        function: resolver
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
      title: Sustainability Assessment
      description: Assessment and checklist for this issue.
      label: Sustainability
  jira:globalPage:
    - key: sustainability-dashboard
      resource: dashboard-resource
      resolver:
        function: resolver
      title: Sustainability Dashboard
  jira:issueAction:
    # Same UI as Sustainability Panel — opens full assessment in ⋯ modal (reliable vs inline panel chrome).
    - key: assess-sustainability
      title: Assess sustainability
      resource: issue-panel-resource
      resolver:
        function: resolver
      viewportSize: xlarge
    - key: complete-with-sustainability-check
      title: Complete with Sustainability Check
      resource: action-resource
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: admin-page-resource
    path: custom-ui/build-admin
  - key: issue-panel-resource
    path: custom-ui/build-issue
  - key: dashboard-resource
    path: custom-ui/build-dashboard
  - key: action-resource
    path: custom-ui/build-action
  - key: project-page-resource
    path: custom-ui/build-project
permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - write:jira-work
    - storage:app
    - read:sprint:jira-software
    - read:board-scope:jira-software
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/1263aaa7-d809-413b-80ed-9dd279c83ae0
